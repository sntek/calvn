services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    environment:
      - BIFROST_BASE_URL=${BIFROST_BASE_URL}
      - BIFROST_API_KEY=${BIFROST_API_KEY}
      - LANTHANUM_MODEL=${LANTHANUM_MODEL}
      - QWEN_BASE_URL=${QWEN_BASE_URL}
      - ORACLE_MCP_URL=${ORACLE_MCP_URL}
      - JIRA_MCP_URL=${JIRA_MCP_URL}
      - ORACLE_USER=${ORACLE_USER}
      - ORACLE_PASSWORD=${ORACLE_PASSWORD}
      - ORACLE_WALLET_DIR=${ORACLE_WALLET_DIR}
      - ORACLE_TNS_ALIAS=${ORACLE_TNS_ALIAS}
      - ORACLE_DISPLAY_NAME=${ORACLE_DISPLAY_NAME}
      - FRONTEND_URL=${FRONTEND_URL}
      - DB_PATH=${DB_PATH}
      - MAX_CONCURRENT_REQUESTS=${MAX_CONCURRENT_REQUESTS}
    volumes:
      - backend-data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    ports:
      - "3001:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
